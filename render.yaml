services:
# Backend API
- type: web
  name: smart-complaint-backend
  runtime: node
  region: oregon
  rootDir: backend
  buildCommand: npm install
  startCommand: node server.js
  envVars:
    - key: MONGO_URI
      sync: false
    - key: JWT_SECRET
      generateValue: true
    - key: NODE_ENV
      value: production
    - key: OPENROUTER_API_KEY
      sync: false

# Frontend Static Site
- type: web
  name: smart-complaint-frontend
  runtime: static
  rootDir: frontend
  buildCommand: npm install && npm run build
  staticPublishPath: dist
  routes:
    - type: rewrite
      source: /*
      destination: /index.html
  envVars:
    - key: VITE_API_URL
      fromService:
        type: web
        name: smart-complaint-backend
        envVarKey: RENDER_EXTERNAL_URL

